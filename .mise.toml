[tools]
node = "22"
bun = "latest"

[tasks.build]
run = "bun run scripts/build.ts"
description = "Build all packages"

[tasks.build-core]
run = "bun run scripts/build.ts --filter @prefactor/core"
description = "Build @prefactor/core package"

[tasks.build-langchain]
run = "bun run scripts/build.ts --filter @prefactor/langchain"
description = "Build @prefactor/langchain package"

[tasks.build-ai]
run = "bun run scripts/build.ts --filter @prefactor/ai"
description = "Build @prefactor/ai package"

[tasks.build-openclaw]
run = "bun run scripts/build.ts --filter @prefactor/openclaw-prefactor-plugin"
description = "Build @prefactor/openclaw-prefactor-plugin package"

[tasks.test]
run = "bun test"
description = "Run all tests"

[tasks.test-watch]
run = "bun test --watch"
description = "Watch tests for changes"

[tasks.typecheck]
run = "bun run tsc --build"
description = "Type check with project references"

[tasks.lint]
run = "bun run biome check ."
description = "Lint code"

[tasks.format]
run = "bun run biome format --write ."
description = "Format code"

[tasks.check]
depends = ["typecheck", "lint", "test"]
description = "Run all checks"

[tasks.clean]
run = "rm -rf packages/*/dist node_modules"
description = "Clean build artifacts"

[tasks.install]
run = "bun install"
description = "Install dependencies"

[tasks.release-version]
run = "bun run release:version"
description = "Apply pending changesets and sync release metadata"

[tasks.release-npm]
run = "bun run release:npm"
description = "Build and publish npm packages via changesets"
