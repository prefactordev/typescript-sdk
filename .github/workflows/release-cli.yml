name: Release CLI Binaries

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64-baseline
            asset: prefactor-linux-x64.tar.gz
            binary_name: prefactor
            archive_format: tar.gz
          - target: bun-linux-arm64
            asset: prefactor-linux-arm64.tar.gz
            binary_name: prefactor
            archive_format: tar.gz
          - target: bun-linux-x64-musl
            asset: prefactor-linux-x64-musl.tar.gz
            binary_name: prefactor
            archive_format: tar.gz
          - target: bun-linux-arm64-musl
            asset: prefactor-linux-arm64-musl.tar.gz
            binary_name: prefactor
            archive_format: tar.gz
          - target: bun-darwin-x64-baseline
            asset: prefactor-darwin-x64.tar.gz
            binary_name: prefactor
            archive_format: tar.gz
          - target: bun-darwin-arm64
            asset: prefactor-darwin-arm64.tar.gz
            binary_name: prefactor
            archive_format: tar.gz
          - target: bun-windows-x64-baseline
            asset: prefactor-windows-x64.zip
            binary_name: prefactor.exe
            archive_format: zip
          - target: bun-windows-arm64
            asset: prefactor-windows-arm64.zip
            binary_name: prefactor.exe
            archive_format: zip
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: |
          mkdir -p dist/cli/raw dist/cli/stage
          bun build \
            --compile \
            --target=${{ matrix.target }} \
            --minify \
            packages/cli/src/bin/cli.ts \
            --outfile dist/cli/raw/${{ matrix.binary_name }}
      - name: Package archive
        run: |
          rm -rf dist/cli/stage/*
          cp dist/cli/raw/${{ matrix.binary_name }} dist/cli/stage/${{ matrix.binary_name }}
          if [ "${{ matrix.archive_format }}" = "zip" ]; then
            (
              cd dist/cli/stage
              zip -q ../${{ matrix.asset }} ${{ matrix.binary_name }}
            )
          else
            tar -czf dist/cli/${{ matrix.asset }} -C dist/cli/stage ${{ matrix.binary_name }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/cli/${{ matrix.asset }}

  smoke-test:
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: prefactor-linux-x64.tar.gz
            archive: prefactor-linux-x64.tar.gz
            extracted_bin: prefactor
            requires_musl: false
          - os: ubuntu-latest
            artifact: prefactor-linux-x64-musl.tar.gz
            archive: prefactor-linux-x64-musl.tar.gz
            extracted_bin: prefactor
            requires_musl: true
          - os: ubuntu-24.04-arm
            artifact: prefactor-linux-arm64.tar.gz
            archive: prefactor-linux-arm64.tar.gz
            extracted_bin: prefactor
            requires_musl: false
          - os: ubuntu-24.04-arm
            artifact: prefactor-linux-arm64-musl.tar.gz
            archive: prefactor-linux-arm64-musl.tar.gz
            extracted_bin: prefactor
            requires_musl: true
          - os: macos-latest
            artifact: prefactor-darwin-arm64.tar.gz
            archive: prefactor-darwin-arm64.tar.gz
            extracted_bin: prefactor
            requires_musl: false
          - os: macos-15-intel
            artifact: prefactor-darwin-x64.tar.gz
            archive: prefactor-darwin-x64.tar.gz
            extracted_bin: prefactor
            requires_musl: false
          - os: windows-latest
            artifact: prefactor-windows-x64.zip
            archive: prefactor-windows-x64.zip
            extracted_bin: prefactor.exe
            requires_musl: false
          - os: windows-11-arm
            artifact: prefactor-windows-arm64.zip
            archive: prefactor-windows-arm64.zip
            extracted_bin: prefactor.exe
            requires_musl: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
      - name: Run smoke test (linux musl)
        if: runner.os == 'Linux' && matrix.requires_musl
        env:
          ARCHIVE: ${{ matrix.archive }}
          EXTRACTED_BIN: ${{ matrix.extracted_bin }}
        run: |
          docker run --rm \
            -e HOME=/tmp/prefactor-home \
            -e ARCHIVE \
            -e EXTRACTED_BIN \
            -v "$PWD:/work" \
            -w /work \
            alpine:3.22 \
            sh -euxc '
              apk add --no-cache ca-certificates libgcc libstdc++
              rm -rf "$HOME" smoke
              mkdir -p "$HOME" smoke
              tar -xzf "$ARCHIVE" -C smoke
              chmod +x "smoke/$EXTRACTED_BIN"
              "smoke/$EXTRACTED_BIN" --version
              "smoke/$EXTRACTED_BIN" install --channel stable
              "$HOME/.prefactor/bin/prefactor" doctor
              "$HOME/.prefactor/bin/prefactor" update
              "$HOME/.prefactor/bin/prefactor" doctor
            '
      - name: Run smoke test (unix)
        if: runner.os != 'Windows' && !matrix.requires_musl
        run: |
          export HOME="${RUNNER_TEMP}/prefactor-home"
          rm -rf "$HOME" && mkdir -p "$HOME"
          rm -rf smoke && mkdir smoke
          tar -xzf ${{ matrix.archive }} -C smoke
          chmod +x smoke/${{ matrix.extracted_bin }}
          smoke/${{ matrix.extracted_bin }} --version
          smoke/${{ matrix.extracted_bin }} install --channel stable
          "$HOME/.prefactor/bin/prefactor" doctor
          "$HOME/.prefactor/bin/prefactor" update
          "$HOME/.prefactor/bin/prefactor" doctor
      - name: Run smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP 'prefactor-home'
          New-Item -ItemType Directory -Path $env:USERPROFILE -Force | Out-Null
          Remove-Item -LiteralPath smoke -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path smoke | Out-Null
          Expand-Archive -LiteralPath ${{ matrix.archive }} -DestinationPath smoke -Force
          .\smoke\${{ matrix.extracted_bin }} --version
          .\smoke\${{ matrix.extracted_bin }} install --channel stable
          & "$env:USERPROFILE\.prefactor\bin\prefactor.exe" doctor
          $output = & "$env:USERPROFILE\.prefactor\bin\prefactor.exe" update 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) {
            Write-Output $output
            Write-Error "prefactor update failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Output $output
          if ($output -notmatch "Update started") {
            Write-Error "Expected update start message not found"
            exit 1
          }

  release:
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    concurrency:
      group: ${{ github.ref_type != 'tag' && format('{0}-canary', github.repository) || format('{0}-{1}', github.workflow, github.ref) }}
      cancel-in-progress: ${{ github.ref_type != 'tag' }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/cli
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist/cli
          sha256sum -- *.tar.gz *.zip > SHA256SUMS
      - name: Create versioned release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: false
          files: dist/cli/*
      - name: Delete canary tag
        if: github.ref_type != 'tag'
        run: gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/canary || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create canary release
        if: github.ref_type != 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary
          target_commitish: ${{ github.sha }}
          prerelease: true
          files: dist/cli/*
